<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Beach Volleyball Showdown</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BVS">
  <meta name="theme-color" content="#05001a">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas" width="1350" height="600"></canvas>
    <button id="btn-mute" title="Toggle Music">🔊</button>
    <div id="version-badge">v1.1.1</div>
    <div id="touch-hint">
      <div class="touch-hint-side">← DRAG TO MOVE</div>
      <div class="touch-hint-side">DRAG TO MOVE →</div>
    </div>
    <div id="mobile-jump-btns">
      <button id="jump-btn-p1" class="mobile-jump-btn">▲</button>
      <button id="jump-btn-p2" class="mobile-jump-btn">▲</button>
    </div>
    <div id="ui-overlay">
      <div id="screen-start" class="screen active">
        <div class="title-card">
          <div class="game-logo">
            <div class="logo-presents">FREDAGSPRINSEN PRESENTS</div>
            <div class="logo-top">BEACH VOLLEYBALL</div>
            <div class="logo-main">SHOWDOWN</div>
          </div>
          <div class="start-btn-col">
            <button id="btn-start" class="btn-primary btn-menu">LOCAL PLAY</button>
            <button id="btn-vs-bot" class="btn-menu btn-menu-secondary">VS BOT</button>
            <button id="btn-online" class="btn-menu btn-menu-secondary">ONLINE</button>
            <button id="btn-tournament" class="btn-menu btn-menu-secondary">TOURNAMENT</button>
            <button id="btn-customize-menu" class="btn-menu btn-menu-ghost">CUSTOMIZE</button>
            <button id="btn-stats" class="btn-menu btn-menu-ghost">STATS</button>
          </div>
        </div>
      </div>

      <!-- BOT DIFFICULTY SCREEN -->
      <div id="screen-bot" class="screen">
        <div class="title-card">
          <div class="game-logo" style="margin-bottom:28px">
            <div class="logo-top">CHALLENGE</div>
            <div class="logo-main" style="font-size:3rem">VS BOT</div>
          </div>
          <p style="color:rgba(255,255,255,0.4);font-size:0.8rem;letter-spacing:3px;margin-bottom:20px">DIFFICULTY</p>
          <div class="start-btn-col">
            <button class="diff-btn btn-menu" data-diff="easy" style="background:rgba(0,255,100,0.12);border:1px solid rgba(0,255,100,0.4);color:#00ff9d">EASY</button>
            <button class="diff-btn btn-menu" data-diff="medium" style="background:rgba(255,180,0,0.12);border:1px solid rgba(255,180,0,0.4);color:#ffb400">MEDIUM</button>
            <button class="diff-btn btn-menu" data-diff="hard" style="background:rgba(255,45,120,0.12);border:1px solid rgba(255,45,120,0.4);color:#ff2d78">HARD</button>
          </div>
          <button id="btn-back-bot" class="btn-back">← Back</button>
        </div>
      </div>

      <!-- TOURNAMENT SCREEN -->
      <div id="screen-tournament" class="screen">
        <div class="tournament-card">
          <div id="tournament-content"></div>
        </div>
      </div>

      <div id="screen-online" class="screen">
        <div class="title-card">
          <h2 style="color:#FFD700;letter-spacing:4px;margin-bottom:24px">ONLINE PLAY</h2>
          <div id="online-lobby">
            <button id="btn-create-room" class="btn-primary" style="width:100%;margin-bottom:16px">CREATE ROOM</button>
            <div class="online-divider">— or join with code —</div>
            <div class="online-join-row">
              <input id="room-code-input" type="text" maxlength="6" placeholder="XXXXXX" autocomplete="off" />
              <button id="btn-join-room" class="btn-secondary">JOIN</button>
            </div>
          </div>
          <div id="online-status"></div>
          <button id="btn-back-local" class="btn-back">← Back</button>
        </div>
      </div>

      <!-- CUSTOMIZE SCREEN -->
      <div id="screen-customize" class="screen">
        <div class="customize-card">
          <h2 class="customize-title">CUSTOMIZE PLAYERS</h2>
          <div class="customize-panels" id="customize-panels">
            <!-- Panels injected by JS -->
          </div>
          <div style="display:flex;gap:12px;justify-content:center;margin-top:28px;flex-wrap:wrap">
            <button id="btn-save-build" class="btn-secondary" style="padding:12px 36px;font-size:0.95rem;letter-spacing:2px">SAVE BUILD</button>
            <button id="btn-start-game" class="btn-primary" style="padding:14px 48px">START GAME</button>
          </div>
          <button id="btn-back-customize" class="btn-back">← Back</button>
        </div>
      </div>

      <!-- STATS SCREEN -->
      <div id="screen-stats" class="screen">
        <div class="stats-card">
          <h2 class="stats-title">STATISTICS</h2>
          <div class="stats-panels" id="stats-panels">
            <!-- Injected by JS -->
          </div>
          <div style="display:flex;gap:14px;justify-content:center;margin-top:28px;flex-wrap:wrap">
            <button id="btn-reset-stats" class="btn-secondary">RESET STATS</button>
            <button id="btn-back-stats" class="btn-back" style="margin-top:0">← Back</button>
          </div>
        </div>
      </div>

      <div id="screen-game" class="screen">
        <div id="hud">
          <div class="score-panel p1-score">
            <span class="player-label">P1</span>
            <span class="score-val" id="score-p1">0</span>
            <div class="set-dots" id="sets-p1"></div>
          </div>
          <div class="set-info">
            <span id="set-label">Set 1</span>
            <div id="gamepad-status" style="font-size:0.7rem;margin-top:2px;opacity:0.6"></div>
          </div>
<div class="score-panel p2-score">
            <div class="set-dots" id="sets-p2"></div>
            <span class="score-val" id="score-p2">0</span>
            <span class="player-label">P2</span>
          </div>
        </div>
      </div>

      <div id="screen-point" class="screen">
        <div class="point-card">
          <div id="point-message"></div>
          <div id="point-sub"></div>
        </div>
      </div>

      <div id="screen-gameover" class="screen">
        <div class="gameover-card">
          <div id="winner-text"></div>
          <div id="final-score"></div>
          <button id="btn-restart" class="btn-primary">PLAY AGAIN</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Portrait rotate prompt (hidden in landscape, shown in portrait) -->
  <div id="rotate-overlay">
    <div class="rotate-icon">🏐</div>
    <div class="rotate-text">Rotate your device</div>
    <div class="rotate-sub">This game is best in landscape</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="audio.js"></script>
  <script src="game.js"></script>
</body>
</html>
