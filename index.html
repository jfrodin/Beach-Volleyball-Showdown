<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beach Volleyball Showdown</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas" width="1350" height="600"></canvas>
    <div id="ui-overlay">
      <div id="screen-start" class="screen active">
        <div class="title-card">
          <h1>🏐 Beach Volleyball</h1>
          <h2>Showdown</h2>
          <div class="controls-grid">
            <div class="player-controls p1">
              <h3>Player 1</h3>
              <p><kbd>A</kbd><kbd>D</kbd> Move</p>
              <p><kbd>W</kbd> Jump / Hit</p>
            </div>
            <div class="vs-badge">VS</div>
            <div class="player-controls p2">
              <h3>Player 2</h3>
              <p><kbd>←</kbd><kbd>→</kbd> Move</p>
              <p><kbd>↑</kbd> Jump / Hit</p>
            </div>
          </div>
          <p class="subtitle">First to <strong>7 points</strong> wins the set · Best of 3</p>
          <div class="start-btn-row">
            <button id="btn-start" class="btn-primary">LOCAL PLAY</button>
            <button id="btn-online" class="btn-secondary">ONLINE</button>
            <button id="btn-stats" class="btn-secondary">STATS</button>
          </div>
        </div>
      </div>

      <div id="screen-online" class="screen">
        <div class="title-card">
          <h2 style="color:#FFD700;letter-spacing:4px;margin-bottom:24px">ONLINE PLAY</h2>
          <div id="online-lobby">
            <button id="btn-create-room" class="btn-primary" style="width:100%;margin-bottom:16px">CREATE ROOM</button>
            <div class="online-divider">— or join with code —</div>
            <div class="online-join-row">
              <input id="room-code-input" type="text" maxlength="6" placeholder="XXXXXX" autocomplete="off" />
              <button id="btn-join-room" class="btn-secondary">JOIN</button>
            </div>
          </div>
          <div id="online-status"></div>
          <button id="btn-back-local" class="btn-back">← Back</button>
        </div>
      </div>

      <!-- CUSTOMIZE SCREEN -->
      <div id="screen-customize" class="screen">
        <div class="customize-card">
          <h2 class="customize-title">CUSTOMIZE PLAYERS</h2>
          <div class="customize-panels" id="customize-panels">
            <!-- Panels injected by JS -->
          </div>
          <button id="btn-start-game" class="btn-primary" style="margin-top:28px;padding:14px 60px">START GAME</button>
          <button id="btn-back-customize" class="btn-back">← Back</button>
        </div>
      </div>

      <!-- STATS SCREEN -->
      <div id="screen-stats" class="screen">
        <div class="stats-card">
          <h2 class="stats-title">STATISTICS</h2>
          <div class="stats-panels" id="stats-panels">
            <!-- Injected by JS -->
          </div>
          <div style="display:flex;gap:14px;justify-content:center;margin-top:28px;flex-wrap:wrap">
            <button id="btn-reset-stats" class="btn-secondary">RESET STATS</button>
            <button id="btn-back-stats" class="btn-back" style="margin-top:0">← Back</button>
          </div>
        </div>
      </div>

      <div id="screen-game" class="screen">
        <div id="hud">
          <div class="score-panel p1-score">
            <span class="player-label">P1</span>
            <span class="score-val" id="score-p1">0</span>
            <div class="set-dots" id="sets-p1"></div>
          </div>
          <div class="set-info">
            <span id="set-label">Set 1</span>
          </div>
          <button id="btn-mute" title="Toggle Music" style="background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1rem;line-height:1;pointer-events:all;">🔊</button>
          <div class="score-panel p2-score">
            <div class="set-dots" id="sets-p2"></div>
            <span class="score-val" id="score-p2">0</span>
            <span class="player-label">P2</span>
          </div>
        </div>
      </div>

      <div id="screen-point" class="screen">
        <div class="point-card">
          <div id="point-message"></div>
          <div id="point-sub"></div>
        </div>
      </div>

      <div id="screen-gameover" class="screen">
        <div class="gameover-card">
          <div id="winner-text"></div>
          <div id="final-score"></div>
          <button id="btn-restart" class="btn-primary">PLAY AGAIN</button>
        </div>
      </div>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="audio.js"></script>
  <script src="game.js"></script>
</body>
</html>
